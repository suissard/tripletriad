<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="yellowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .rad-circle {
      transform-origin: 50px 50px;
      transform: scale(0);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .rad-blade {
      transform-origin: 50px 50px;
      transform: scaleY(0); /* Start as a line/dot from center */
      opacity: 0;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s;
    }

    .rad-blade-2 { transition-delay: 0.5s; }
    .rad-blade-3 { transition-delay: 0.6s; }

    /* Active State */
    .is-active .rad-circle {
      transform: scale(1);
      opacity: 1;
    }
    .is-active .rad-blade {
      transform: scaleY(1);
      opacity: 1;
    }
  </style>

  <g filter="url(#yellowGlow)">
    <!-- Central Circle -->
    <circle cx="50" cy="50" r="10" fill="#ffff00" class="rad-circle" />

    <!-- Three Radiation Blades (Sectors) -->
    <!-- Top Left -->
    <path d="M 40 40 L 15 15 A 50 50 0 0 1 50 0 L 50 35 Z" fill="#ffff00" transform="rotate(-60 50 50)" class="rad-blade rad-blade-1" />

    <!-- Right -->
    <path d="M 60 50 L 95 30 A 50 50 0 0 1 95 70 L 60 50 Z" fill="#ffff00" transform="rotate(60 50 50)" class="rad-blade rad-blade-2" />

    <!-- Bottom Left -->
    <path d="M 50 60 L 15 85 A 50 50 0 0 0 50 100 L 50 65 Z" fill="#ffff00" transform="rotate(180 50 50)" class="rad-blade rad-blade-3" />
  </g>
</svg>
