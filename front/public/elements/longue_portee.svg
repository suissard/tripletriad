<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .target-ring {
      transform-origin: 50% 50%;
      transform: scale(0.8) rotate(0deg);
      opacity: 0.5;
      transition: all 0.5s ease-in-out;
    }
    
    .target-crosshair {
      opacity: 0.6;
      transition: all 0.5s ease-in-out;
    }

    .orbital-beam {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      opacity: 0;
      transition: stroke-dashoffset 0.6s cubic-bezier(0.1, 0.9, 0.2, 1) 0.2s, opacity 0.4s ease 0.2s;
    }

    .impact-wave {
      transform-origin: 50% 75%;
      transform: scale(0) scaleY(0.3);
      opacity: 0;
      transition: transform 0.6s ease-out 0.5s, opacity 0.6s ease-out 0.5s;
    }

    /* Active State (Frappe orbitale) */
    .is-active .target-ring {
      transform: scale(1) rotate(45deg);
      opacity: 1;
      stroke: #ff3333;
    }

    .is-active .target-crosshair {
      opacity: 1;
      stroke: #ff3333;
    }

    .is-active .orbital-beam {
      stroke-dashoffset: 0;
      opacity: 1;
    }

    .is-active .impact-wave {
      transform: scale(1.5) scaleY(0.3);
      opacity: 0; /* Fade out as it expands */
      animation: pulseImpact 1s ease-out forwards 0.5s;
    }
    
    @keyframes pulseImpact {
        0% { transform: scale(0.2) scaleY(0.3); opacity: 0.8; }
        100% { transform: scale(2) scaleY(0.3); opacity: 0; }
    }
  </style>

  <g filter="url(#redGlow)">
    <!-- Base Target -->
    <circle cx="50" cy="75" r="15" fill="none" stroke="#ff0000" stroke-width="2" class="target-ring" />
    <circle cx="50" cy="75" r="5" fill="none" stroke="#ff0000" stroke-width="1" class="target-ring" />

    <g class="target-crosshair" stroke="#ff0000" stroke-width="2">
      <line x1="30" y1="75" x2="40" y2="75" />
      <line x1="60" y1="75" x2="70" y2="75" />
      <line x1="50" y1="55" x2="50" y2="65" />
      <line x1="50" y1="85" x2="50" y2="95" />
    </g>

    <!-- Orbital Beam -->
    <path d="M50 0 L50 75" fill="none" stroke="#ff3333" stroke-width="8" stroke-linecap="round" class="orbital-beam" />
    <path d="M50 0 L50 75" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" class="orbital-beam" />

    <!-- Impact Wave -->
    <circle cx="50" cy="75" r="20" fill="none" stroke="#ff0000" stroke-width="4" class="impact-wave" />
  </g>
</svg>
