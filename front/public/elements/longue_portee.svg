<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g stroke="#ff0000" stroke-width="6" fill="none" filter="url(#redGlow)" stroke-linecap="square">
    <!-- Retro Square Viewfinder Corners -->
    <!-- Top Left -->
    <path d="M15 35 L15 15 L35 15" />
    <!-- Top Right -->
    <path d="M65 15 L85 15 L85 35" />
    <!-- Bottom Left -->
    <path d="M15 65 L15 85 L35 85" />
    <!-- Bottom Right -->
    <path d="M65 85 L85 85 L85 65" />
    
    <!-- Central Crosshair (Retro style, small gaps) -->
    <line x1="50" y1="40" x2="50" y2="45" stroke-width="4" />
    <line x1="50" y1="55" x2="50" y2="60" stroke-width="4" />
    <line x1="40" y1="50" x2="45" y2="50" stroke-width="4" />
    <line x1="55" y1="50" x2="60" y2="50" stroke-width="4" />

    <!-- Center Point -->
    <rect x="48.5" y="48.5" width="3" height="3" fill="#ff0000" stroke="none" />
    
    <!-- Digital Scanlines / HUD details -->
    <line x1="20" y1="30" x2="30" y2="30" stroke-width="2" opacity="0.6" />
    <line x1="70" y1="70" x2="80" y2="70" stroke-width="2" opacity="0.6" />
  </g>
</svg>
