<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="lavaGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Destructured Obsidian Block (Irregular shards) -->
  <g fill="#1a1a2e" stroke="#000" stroke-width="1.5">
    <!-- Main irregular mass -->
    <path d="M15 30 L40 10 L85 25 L95 60 L75 90 L30 85 L10 65 Z" />
    <!-- Top facets -->
    <path d="M15 30 L40 10 L60 25 L15 30 Z" fill="#2a2a3e" />
    <path d="M40 10 L85 25 L60 25 L40 10 Z" fill="#222235" />
    <!-- Side facets -->
    <path d="M10 65 L15 30 L35 50 L10 65 Z" fill="#15152a" />
    <path d="M95 60 L85 25 L75 50 L95 60 Z" fill="#0f0f1f" />
  </g>

  <!-- Extensive Lava Grooves (Orange/Red spanning long en large) -->
  <g fill="none" stroke="#ff4500" stroke-width="3" filter="url(#lavaGlow)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical/Criss-cross grooves -->
    <path d="M25 15 L35 45 L20 75" />
    <path d="M70 20 L60 55 L80 85" />
    <!-- Horizontal spanning grooves -->
    <path d="M10 50 Q 50 60 95 40" />
    <path d="M20 35 Q 50 20 80 40" />
    <path d="M30 85 Q 55 70 85 80" />
    <!-- Small branches -->
    <path d="M45 15 L55 35" />
    <path d="M50 65 L40 85" />
  </g>

  <!-- Bright Lava Centers (Yellow/Orange contrast) -->
  <g fill="none" stroke="#ffcc00" stroke-width="1" stroke-linecap="round">
    <path d="M25 15 L35 45 L20 75" />
    <path d="M70 20 L60 55 L80 85" />
    <path d="M10 50 Q 50 60 95 40" />
    <path d="M20 35 Q 50 20 80 40" />
    <path d="M30 85 Q 55 70 85 80" />
  </g>
</svg>
