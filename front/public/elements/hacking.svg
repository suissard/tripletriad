<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Amber/Orange gradients -->
    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffbf00" />
      <stop offset="100%" stop-color="#ff8c00" />
    </linearGradient>
    <filter id="neonAmber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Processor Legs (Coming out of skull) -->
  <g stroke="#d35400" stroke-width="4" stroke-linecap="butt" filter="url(#neonAmber)">
    <!-- Top Legs -->
    <path d="M36 30 L36 15" />
    <path d="M50 25 L50 10" />
    <path d="M64 30 L64 15" />
    <!-- Bottom Legs -->
    <path d="M42 75 L42 90" />
    <path d="M58 75 L58 90" />
    <!-- Left Legs -->
    <path d="M25 45 L10 45" />
    <path d="M25 60 L10 60" />
    <!-- Right Legs -->
    <path d="M75 45 L90 45" />
    <path d="M75 60 L90 60" />
  </g>

  <!-- Pixel Skull (Blocky/Amber) -->
  <g fill="url(#amberGlow)" filter="url(#neonAmber)">
    <!-- Main head block -->
    <rect x="25" y="30" width="50" height="35" />
    <rect x="30" y="25" width="40" height="5" />
    <!-- Jaw block -->
    <rect x="35" y="65" width="30" height="10" />
  </g>

  <!-- Face details (Black Pixels) -->
  <g fill="black">
    <!-- Eyes -->
    <rect x="33" y="40" width="10" height="10" />
    <rect x="57" y="40" width="10" height="10" />
    <!-- Nose (Black hole) -->
    <rect x="46" y="54" width="8" height="6" />
  </g>
</svg>
