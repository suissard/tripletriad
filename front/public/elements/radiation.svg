<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="yellowGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g fill="#ffff00" filter="url(#yellowGlow)">
    <!-- Central Circle -->
    <circle cx="50" cy="50" r="10" />
    
    <!-- Trefoil blades (Radiation symbol) -->
    <!-- Top Blade -->
    <path d="M50 35 L50 10 A40 40 0 0 1 84.6 30 Z" transform="rotate(0 50 50)" />
    <!-- Bottom Right Blade -->
    <path d="M50 35 L50 10 A40 40 0 0 1 84.6 30 Z" transform="rotate(120 50 50)" />
    <!-- Bottom Left Blade -->
    <path d="M50 35 L50 10 A40 40 0 0 1 84.6 30 Z" transform="rotate(240 50 50)" />
  </g>
</svg>
