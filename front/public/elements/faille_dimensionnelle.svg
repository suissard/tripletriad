<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Intense Purple Glow -->
    <filter id="purpleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Shattered Space Layers (Destructured shards) -->
  <g fill="#8e44ad" opacity="0.6" filter="url(#purpleGlow)">
    <path d="M50 10 L60 30 L90 20 L75 50 L95 70 L65 75 L50 95 L35 75 L5 70 L25 50 L10 20 L40 30 Z" />
  </g>
  
  <g fill="#4b0082" opacity="0.8">
    <path d="M50 25 L55 40 L80 35 L70 50 L85 65 L55 60 L50 80 L45 60 L15 65 L30 50 L20 35 L45 40 Z" />
  </g>

  <!-- The Black Hole Core (Event Horizon) -->
  <circle cx="50" cy="50" r="15" fill="black" />
  
  <!-- The Singularity (Aggressive/Jagged white core) -->
  <path d="M50 42 L52 48 L58 50 L52 52 L50 58 L48 52 L42 50 L48 48 Z" fill="#fff" filter="url(#purpleGlow)" />

  <!-- Light shards / Rayons -->
  <g stroke="#fff" stroke-width="1.5" opacity="0.4">
    <line x1="50" y1="50" x2="80" y2="20" />
    <line x1="50" y1="50" x2="20" y2="80" />
    <line x1="50" y1="50" x2="85" y2="75" />
    <line x1="50" y1="50" x2="15" y2="25" />
  </g>

  <!-- Secondary Glow Shards -->
  <path d="M30 20 L50 35 L70 20 Z" fill="#9b59b6" opacity="0.3" />
  <path d="M30 80 L50 65 L70 80 Z" fill="#9b59b6" opacity="0.3" />
</svg>
