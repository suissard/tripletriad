<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Removed dark background -->
  <path d="M50 20 L80 50 L50 80 L20 50 Z" fill="none" stroke="url(#glow)" stroke-width="2" filter="url(#neonGlow)" opacity="0.5"/>
  
  <!-- Circuit lines -->
  <path d="M50 50 L50 20 M50 50 L80 50 M50 50 L50 80 M50 50 L20 50" stroke="url(#glow)" stroke-width="3" filter="url(#neonGlow)"/>
  <path d="M20 20 L35 35 M80 20 L65 35 M20 80 L35 65 M80 80 L65 65" stroke="url(#glow)" stroke-width="2" filter="url(#neonGlow)"/>

  <!-- Nodes -->
  <circle cx="50" cy="50" r="8" fill="#fff" filter="url(#neonGlow)"/>
  <circle cx="50" cy="20" r="4" fill="#00f2fe" filter="url(#neonGlow)"/>
  <circle cx="80" cy="50" r="4" fill="#00f2fe" filter="url(#neonGlow)"/>
  <circle cx="50" cy="80" r="4" fill="#00f2fe" filter="url(#neonGlow)"/>
  <circle cx="20" cy="50" r="4" fill="#00f2fe" filter="url(#neonGlow)"/>
  
  <circle cx="35" cy="35" r="3" fill="#4facfe" />
  <circle cx="65" cy="35" r="3" fill="#4facfe" />
  <circle cx="35" cy="65" r="3" fill="#4facfe" />
  <circle cx="65" cy="65" r="3" fill="#4facfe" />
</svg>
